- alias: Monitoring Center - urządzenie offline
  mode: single
  trigger:
    - platform: event
      event_type: monitor_offline
  action:
    - service: persistent_notification.create
      data:
        title: "Monitor offline"
        message: >
          {{ trigger.event.data.monitor_name }} jest offline.
          Cel: {{ trigger.event.data.target }}

- alias: Monitoring Center - strona zmieniona
  mode: queued
  trigger:
    - platform: event
      event_type: website_changed
  action:
    - service: persistent_notification.create
      data:
        title: "Wykryto zmianę strony"
        message: >
          {{ trigger.event.data.monitor_name }} zmieniła zawartość.
          Poprzedni stan: {{ trigger.event.data.previous_state }},
          nowy stan: {{ trigger.event.data.new_state }}.

- alias: Monitoring Center - encja binary_sensor offline
  mode: single
  trigger:
    - platform: state
      entity_id: binary_sensor.monitoring_center_1_router_status
      to: "off"
      for: "00:02:00"
  action:
    - service: notify.mobile_app_your_phone
      data:
        title: "Router offline"
        message: "Monitoring Center nie widzi routera od 2 minut."

- alias: Monitoring Center - błąd strony WWW
  mode: queued
  trigger:
    - platform: event
      event_type: website_error
  action:
    - service: logbook.log
      data:
        name: Monitoring Center
        message: >
          Błąd strony {{ trigger.event.data.monitor_name }}:
          {{ trigger.event.data.new_state }}

- alias: Monitoring Center - ping hosta offline
  mode: single
  trigger:
    - platform: event
      event_type: monitor_offline
  condition:
    - condition: template
      value_template: "{{ trigger.event.data.monitor_type == 'ping_host' }}"
  action:
    - service: persistent_notification.create
      data:
        title: "Ping hosta nie odpowiada"
        message: "{{ trigger.event.data.monitor_name }} jest offline."

- alias: Monitoring Center - port TCP zamknięty
  mode: queued
  trigger:
    - platform: event
      event_type: tcp_port_closed
  action:
    - service: persistent_notification.create
      data:
        title: "Port TCP niedostępny"
        message: >
          {{ trigger.event.data.monitor_name }}:
          {{ trigger.event.data.details.host }}:{{ trigger.event.data.details.port }}

- alias: Monitoring Center - hash strony zmieniony
  mode: queued
  trigger:
    - platform: event
      event_type: website_hash_changed
  action:
    - service: persistent_notification.create
      data:
        title: "Hash strony zmieniony"
        message: >
          {{ trigger.event.data.monitor_name }} zmieniła hash.
          Aktualny hash: {{ trigger.event.data.details.current_hash }}

- alias: Monitoring Center - certyfikat SSL wygasa
  mode: queued
  trigger:
    - platform: event
      event_type: ssl_certificate_expiring
  action:
    - service: persistent_notification.create
      data:
        title: "Certyfikat SSL wygasa"
        message: >
          {{ trigger.event.data.monitor_name }}:
          {{ trigger.event.data.details.days_left }} dni do wygaśnięcia.

- alias: Monitoring Center - encja Home Assistant niedostępna
  mode: queued
  trigger:
    - platform: event
      event_type: ha_entity_state_changed
  condition:
    - condition: template
      value_template: "{{ trigger.event.data.details.state in ['unavailable', 'unknown', 'off'] }}"
  action:
    - service: persistent_notification.create
      data:
        title: "Encja Home Assistant w stanie alarmowym"
        message: >
          {{ trigger.event.data.monitor_name }} ma stan
          {{ trigger.event.data.details.state }}.
