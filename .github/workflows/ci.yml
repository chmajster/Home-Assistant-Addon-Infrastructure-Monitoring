name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install pinned tools and runtime
        run: |
          python -m pip install -r monitoring_center/requirements.txt
          python -m pip install pytest==8.3.4 ruff==0.8.6 mypy==1.14.1 yamllint==1.35.1 PyYAML==6.0.2 pip-audit==2.7.3
      - name: Validate repository metadata and offline wheelhouse
        run: python tools/validate_repository.py
      - name: Validate YAML
        run: |
          find . -type f \( -name '*.yaml' -o -name '*.yml' \) -not -path './.git/*' -print0 \
            | xargs -0 yamllint -d '{extends: relaxed, rules: {line-length: disable}}'
      - name: Reject likely committed secrets
        run: |
          ! git grep -nEI '(BEGIN (RSA|OPENSSH|EC) PRIVATE KEY|ghp_[A-Za-z0-9]{30,}|sk-[A-Za-z0-9]{32,}|SUPERVISOR_TOKEN=.+)' -- ':!*.md' ':!tools/*'
      - run: ruff format --check .
      - run: ruff check .
      - run: mypy monitoring_center/monitoring_center
      - name: Test fresh databases and all migrations
        run: pytest -q
      - name: Audit runtime dependencies used by CI
        run: pip-audit -r monitoring_center/requirements.txt

  image:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Build add-on from its offline context
        run: |
          docker build --file monitoring_center/Dockerfile --tag monitoring-center:ci \
            --build-arg BUILD_ARCH=amd64 --build-arg BUILD_VERSION=0.12.0 --build-arg BUILD_REVISION=${{ github.sha }} \
            monitoring_center
      - name: Start and probe health/readiness
        run: |
          mkdir -p "$RUNNER_TEMP/monitoring-data"
          printf '%s\n' '{"database_path":"/data/monitoring_center.db","log_file":"/data/monitoring_center.log"}' > "$RUNNER_TEMP/monitoring-data/options.json"
          docker run -d --rm --name monitoring-center-ci -p 18099:8099 -v "$RUNNER_TEMP/monitoring-data:/data" monitoring-center:ci
          for attempt in $(seq 1 30); do curl --fail --silent http://127.0.0.1:18099/health && break; sleep 1; done
          curl --fail --silent http://127.0.0.1:18099/ready | python -c 'import json,sys; assert json.load(sys.stdin)["status"] == "ready"'
      - name: Container logs
        if: failure()
        run: docker logs monitoring-center-ci
      - name: Stop container
        if: always()
        run: docker stop monitoring-center-ci || true
