name: Monitoring Center
version: "0.3.0"
slug: monitoring_center
description: Local network and website monitoring center for Home Assistant
url: https://github.com/local/home-assistant-monitoring
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: application
boot: auto
init: false
ingress: true
ingress_port: 8099
panel_icon: mdi:monitor-dashboard
panel_title: Monitoring Center
panel_admin: true
homeassistant_api: true
hassio_api: true
ports:
  8099/tcp: null
ports_description:
  8099/tcp: Monitoring Center web UI
options:
  log_level: info
  database_path: /data/monitoring_center.db
  log_file: /data/monitoring_center.log
  retention_days: 30
  default_device_interval: 60
  default_website_interval: 300
  request_timeout_seconds: 10
  ping_timeout_seconds: 3
  max_page_size_kb: 512
  block_private_networks: false
  publish_home_assistant_entities: true
  publish_home_assistant_events: true
  entity_prefix: monitoring_center
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)
  database_path: str
  log_file: str
  retention_days: int(1,3650)
  default_device_interval: int(5,86400)
  default_website_interval: int(10,86400)
  request_timeout_seconds: int(1,120)
  ping_timeout_seconds: int(1,30)
  max_page_size_kb: int(16,10240)
  block_private_networks: bool
  publish_home_assistant_entities: bool
  publish_home_assistant_events: bool
  entity_prefix: str
