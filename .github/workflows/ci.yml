name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade pip
      - run: pip install -r monitoring_center/requirements.txt pytest ruff mypy
      - run: ruff check .
      - run: mypy monitoring_center/monitoring_center
      - run: pytest
