configuration:
  log_level:
    name: Log level
    description: Application log verbosity.
  database_path:
    name: SQLite database path
    description: Database file location inside the container.
  log_file:
    name: Log file
    description: Application log file location.
  retention_days:
    name: Data retention
    description: Number of days to keep history, snapshots and events.
  default_interval_seconds:
    name: Default interval
    description: Default interval for new monitors in seconds.
  default_timeout_minutes:
    name: Global timeout
    description: Global timeout for all monitors in minutes.
  max_page_size_mb:
    name: Page size limit
    description: Maximum downloaded page size in MB.
  block_private_networks:
    name: Block private URL addresses
    description: Blocks URLs resolving to local and private addresses.
  publish_home_assistant_entities:
    name: Publish HA entities
    description: Creates binary_sensor and sensor states through the local Home Assistant API.
  publish_home_assistant_events:
    name: Publish HA events
    description: Fires monitor_online, monitor_offline, website_changed and website_error events.
  entity_prefix:
    name: Entity prefix
    description: Prefix used for Home Assistant entity IDs.
network:
  8099/tcp: Monitoring Center web panel
